protocol: "test-lock"

inputs:
  target_addr:
    type: "address"
  lock_epochs:
    type: "uint32"

actions:
  lock:
    calls:
      - description: "Lock tokens for N epochs"
        target: ${inputs.target_addr}
        selector: "lock(uint32)"
        parameters:
          - type: "uint32"
            value: ${inputs.lock_epochs}
        return:
          name: "lock_balance"
          type: "uint256"
    reserved_slots:
      - type: "uint256"
        value: ${returns.lock_balance}
      - type: "uint256"
        value: ${builtins.UINT256_MAX}
